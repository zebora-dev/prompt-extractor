services:
  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: prompt-extractor-prefect
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_URL: http://localhost:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: 4200
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  extractor:
    build: .
    image: prompt-extractor:local
    env_file:
      - .env
    environment:
      CHATGPT_CHROME_USER_DATA_DIR: /app/.chrome-profile
      CHATGPT_HEADLESS: "false"
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - chrome-profile:/app/.chrome-profile
    shm_size: "2gb"
    profiles:
      - tools

  login-vnc:
    image: prompt-extractor:local
    build: .
    env_file:
      - .env
    environment:
      PROMPT_EXTRACTOR_VNC: "true"
      CHATGPT_CHROME_USER_DATA_DIR: /app/.chrome-profile
      CHATGPT_HEADLESS: "false"
    command: python -m automated_extraction --login-only
    ports:
      - "6080:6080"
    volumes:
      - chrome-profile:/app/.chrome-profile
    shm_size: "2gb"
    profiles:
      - tools

  prefect-deploy:
    image: prompt-extractor:local
    build: .
    env_file:
      - .env
    environment:
      CHATGPT_CHROME_USER_DATA_DIR: /app/.chrome-profile
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_WORK_POOL: prompt-extraction-pool
    command: >
      bash -lc "python -m automated_extraction.workflows.register_deployments --create-pool
      && python -m automated_extraction.workflows.register_deployments --deploy-local"
    depends_on:
      - prefect-server
    volumes:
      - chrome-profile:/app/.chrome-profile
    profiles:
      - prefect

  prefect-worker:
    image: prompt-extractor:local
    build: .
    env_file:
      - .env
    environment:
      CHATGPT_CHROME_USER_DATA_DIR: /app/.chrome-profile
      CHATGPT_HEADLESS: "false"
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_WORK_POOL: prompt-extraction-pool
    command: python -m prefect worker start --pool prompt-extraction-pool
    depends_on:
      - prefect-server
    volumes:
      - chrome-profile:/app/.chrome-profile
    shm_size: "2gb"
    profiles:
      - prefect

volumes:
  chrome-profile:
