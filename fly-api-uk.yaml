app: prompt-extractor-api-uk
primary_region: lhr
kill_signal: SIGINT
kill_timeout: 30s

build:
  dockerfile: Dockerfile

env:
  PREFECT_WORKING_DIR: /app
  PREFECT_WORK_POOL: prompt-extraction-api-uk
  PREFECT_LOGGING_EXTRA_LOGGERS: automated_extraction

processes:
  app: python -m prefect worker start --pool prompt-extraction-api-uk --type process --limit 3 --install-policy never

http_service:
  internal_port: 8080
  force_https: true
  auto_stop_machines: false
  min_machines_running: 0
  processes:
    - app

vm:
  - memory: 2048mb
    cpu_kind: performance
    cpus: 1
