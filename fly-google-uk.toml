app = "prompt-extractor-google-uk"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  GOOGLE_CHROME_USER_DATA_DIR = "/data/google-chrome-profile-uk"
  GOOGLE_SEARCH_COUNTRY = "GB"
  GOOGLE_SEARCH_LANGUAGE = "en"
  PREFECT_LOGGING_EXTRA_LOGGERS = "automated_extraction"
  PREFECT_WORKING_DIR = "/app"
  PREFECT_WORK_POOL = "prompt-extraction-google-uk"
  PROMPT_EXTRACTOR_VNC = "true"
  VNC_SCREEN = "1280x720x24"

[processes]
  app = "python -m prefect worker start --pool prompt-extraction-google-uk --type process --limit 1 --install-policy never"

[[mounts]]
  source = "prompt_extractor_google_uk"
  destination = "/data"
  processes = ["app"]

[http_service]
  internal_port = 6080
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "4096mb"
  cpu_kind = "performance"
  cpus = 2
