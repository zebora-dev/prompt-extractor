<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Connecting to VNC…</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a2e; color: #eee; }
    p { font-size: 1.2rem; opacity: 0.8; }
  </style>
</head>
<body>
  <p>Connecting to machine…</p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var machine = params.get('machine');

      if (!machine) {
        window.location.replace('/vnc.html');
        return;
      }

      // Fly.io won't route via a cookie set by JS — it requires the
      // fly-force-instance-id request *header*. We fetch /vnc.html with
      // that header, then replace the current page with the response so
      // the browser is already connected to the correct machine when
      // noVNC opens its WebSocket (which inherits the same connection).
      fetch('/vnc.html', {
        headers: { 'fly-force-instance-id': machine }
      })
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.text();
        })
        .then(function (html) {
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function (err) {
          document.querySelector('p').textContent = 'Error connecting to machine: ' + err.message;
          setTimeout(function () { window.location.replace('/vnc.html'); }, 3000);
        });
    })();
  </script>
</body>
</html>
