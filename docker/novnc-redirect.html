<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Connecting to VNC…</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a2e; color: #eee; }
    p { font-size: 1.2rem; opacity: 0.8; }
  </style>
</head>
<body>
  <p>Connecting to machine…</p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var machine = params.get('machine');
      if (machine) {
        // Fly.io reads fly_instance_id to route the next request to a specific machine.
        // Setting it here means the subsequent /vnc.html request lands on the right worker.
        document.cookie = 'fly_instance_id=' + encodeURIComponent(machine) + '; path=/; SameSite=Lax';
      }
      window.location.replace('/vnc.html');
    })();
  </script>
</body>
</html>
