name: CI

on:
  push:
    branches: [main, feat/us-chatgpt-tests]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install package
        run: pip install -e . --no-deps

      - name: mypy
        run: mypy automated_extraction --ignore-missing-imports || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install package
        run: pip install -e . --no-deps

      - name: Run tests with coverage
        run: pytest --cov=automated_extraction --cov-report=xml --cov-report=term-missing
        env:
          # Provide dummy values so config modules don't fail on import
          CHATGPT_ACCOUNTS_B64: ""
          PREFECT_API_URL: "http://localhost:4200/api"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Bandit security scan
        run: |
          bandit -r automated_extraction -c pyproject.toml \
            --severity-level medium --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r automated_extraction -c pyproject.toml \
            --severity-level medium --confidence-level medium

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install package
        run: pip install -e .

      - name: Verify package imports correctly
        run: |
          python -c "
          from automated_extraction.extraction import build_prompt_output, prompt_text
          from automated_extraction.chatgpt_auth.accounts import AccountsDeserializer
          from automated_extraction.chatgpt_auth.login_method import LoginMethod
          from automated_extraction.supabase_prompt_outputs import compact_row, output_to_row
          from automated_extraction.workflows.flows import prompt_extraction_batch_flow, prompt_extraction_flow
          print('All imports OK')
          "

      - name: Compile all modules
        run: python -m compileall automated_extraction -q
