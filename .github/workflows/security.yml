name: Security Scan (Scheduled)

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  security-scan:
    name: Weekly Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Bandit — static security analysis
        run: |
          bandit -r automated_extraction -c pyproject.toml \
            -f json -o bandit-report.json || true
          bandit -r automated_extraction -c pyproject.toml
        continue-on-error: true

      - name: pip-audit — dependency vulnerability check
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format json -o pip-audit-report.json || true
          pip-audit -r requirements.txt
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.run_id }}
          path: |
            bandit-report.json
            pip-audit-report.json
