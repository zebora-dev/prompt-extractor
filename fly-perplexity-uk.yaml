app: prompt-extractor-perplexity-uk
primary_region: lhr

env:
  PERPLEXITY_URL: https://www.perplexity.ai
  PERPLEXITY_CHROME_USER_DATA_DIR: /data/chrome-profile
  CHATGPT_HEADLESS: "false"
  PREFECT_WORK_POOL: prompt-extraction-perplexity-uk
  PROMPT_EXTRACTOR_VNC: "true"
  VNC_SCREEN: 1280x720x24

processes:
  app: python -m prefect worker start --pool prompt-extraction-perplexity-uk --type process --limit 1 --install-policy never

mounts:
  - source: prompt_extractor_perplexity_uk
    destination: /data

vm:
  - memory: 4096mb
    cpu_kind: performance
    cpus: 2
