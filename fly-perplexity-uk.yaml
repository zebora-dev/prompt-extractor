app: prompt-extractor-perplexity-uk
primary_region: lhr
kill_signal: SIGINT
kill_timeout: 30s

build:
  dockerfile: Dockerfile

env:
  PERPLEXITY_URL: https://www.perplexity.ai
  PERPLEXITY_CHROME_USER_DATA_DIR: /data/chrome-profile
  CHATGPT_HEADLESS: "false"
  PREFECT_WORKING_DIR: /app
  PREFECT_WORK_POOL: prompt-extraction-perplexity-uk
  PROMPT_EXTRACTOR_VNC: "true"
  VNC_SCREEN: 1280x720x24
  PREFECT_LOGGING_EXTRA_LOGGERS: automated_extraction
  GOOGLE_SEARCH_COUNTRY: GB
  GOOGLE_SEARCH_LANGUAGE: en

processes:
  app: python -m prefect worker start --pool prompt-extraction-perplexity-uk --type process --limit 1 --install-policy never

mounts:
  - source: prompt_extractor_perplexity_uk
    destination: /data
    processes:
      - app

http_service:
  internal_port: 6080
  force_https: false
  auto_stop_machines: false
  auto_start_machines: false
  min_machines_running: 0
  sticky_sessions: true
  processes:
    - app

vm:
  - memory: 4096mb
    cpu_kind: performance
    cpus: 2
